name: CI
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
jobs:
  build:
    runs-on: aws-runner-set
    env:
      DOCKER_BUILDKIT: 1
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: |
          docker build \
            -t conekta-mcp:${{ github.run_id }} .

      - name: Run tests
        run: |
          docker run --rm \
            -e CONEKTA_API_KEY=test_key \
            -v ${{ github.workspace }}/coverage:/app/coverage \
            conekta-mcp:${{ github.run_id }} \
            uv run pytest tests/ -v --junitxml=coverage/report.xml --cov=conekta_mcp --cov-report=xml:coverage/coverage.xml

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v7.0.0
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          SONAR_PROJECT_KEY: ${{ github.event.repository.name }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_PROJECT_VERSION: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.ref || github.ref_name }}
