service_name: mcp-server
metadata:
  team: core
  source: python
type: webservice
internal: false
container_port: 8000
container_cpu: 256
container_memory: 512
prefix: /mcp-server
service_desired_count: 2
healthcheck_path: /ping
dockerfile: Dockerfile
environment:
  - name: "CONEKTA_MCP_TRANSPORT"
    value: "streamable-http"
  - name: "CONEKTA_MCP_HOST"
    value: "0.0.0.0"
  - name: "CONEKTA_MCP_PORT"
    value: "8000"
  - name: "CONEKTA_MCP_STREAMABLE_HTTP_PATH"
    value: "/mcp-server/mcp"
  - name: "CONEKTA_API_BASE_URL"
    value: "https://api.conekta.io"
